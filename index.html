<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ROAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#f3d9a8;
    --bg-bottom:#e6c184;
    --mane-dark:#9a5420;
    --mane-mid:#b5682a;
    --mane-light:#cd7e34;
    --face:#eea84f;
    --face-light:#f6c073;
    --ear:#b5682a;
    --ear-inner:#f6c073;
    --mouth-outer:#6e2a1a;
    --mouth-inner:#94372455;
    --mouth-inner-solid:#9b3b27;
    --tongue:#ec4d63;
    --tongue-dark:#c8324a;
    --white:#ffffff;
    --ink:#4a2f15;
    --roar:#7a3d1a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Fredoka',sans-serif;
    background:radial-gradient(circle at 50% 35%, var(--bg-top) 0%, var(--bg-bottom) 100%);
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:24px;overflow:hidden;
  }
  .stage{
    width:100%;max-width:440px;
    display:flex;flex-direction:column;align-items:center;
    animation:rise .7s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:none;}}
 
  .roar-title{
    font-weight:700;font-size:64px;letter-spacing:3px;
    color:var(--roar);margin-bottom:4px;
    display:flex;align-items:center;gap:18px;
  }
  .roar-title .ray{display:flex;flex-direction:column;gap:5px;}
  .roar-title .ray span{height:6px;border-radius:3px;background:var(--roar);}
  .roar-title .ray.l span:nth-child(1){width:34px;transform:rotate(-22deg);}
  .roar-title .ray.l span:nth-child(2){width:40px;}
  .roar-title .ray.l span:nth-child(3){width:34px;transform:rotate(22deg);}
  .roar-title .ray.r span:nth-child(1){width:34px;transform:rotate(22deg);}
  .roar-title .ray.r span:nth-child(2){width:40px;}
  .roar-title .ray.r span:nth-child(3){width:34px;transform:rotate(-22deg);}
 
  .lion-wrap{width:100%;max-width:380px;position:relative;}
  .lion{width:100%;height:auto;display:block;overflow:visible;}
 
  .mouth-btn{cursor:pointer;transform-origin:200px 300px;transition:transform .15s ease;}
  .mouth-btn:active{transform:scale(.94);}
  .stage:not(.playing) .mouth-hint{animation:hintPulse 1.5s ease-in-out infinite;transform-origin:200px 292px;}
  @keyframes hintPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.55;transform:scale(1.1);}}
 
  .playing .lion{animation:bob 1.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1.5deg);}50%{transform:translateY(-10px) rotate(1.5deg);}}
 
  .hint-text{
    margin-top:18px;font-weight:600;font-size:18px;color:var(--ink);
    letter-spacing:.5px;text-align:center;opacity:.85;
    transition:opacity .4s ease;
  }
  .playing .hint-text{opacity:0;}
 
  .timeline{
    margin-top:22px;width:100%;max-width:320px;
    display:flex;align-items:center;gap:12px;
    opacity:0;transition:opacity .4s ease;pointer-events:none;
  }
  .playing .timeline{opacity:1;pointer-events:auto;}
  .time{font-size:13px;font-weight:600;color:var(--ink);min-width:36px;text-align:center;font-variant-numeric:tabular-nums;}
  .bar{flex:1;height:7px;border-radius:7px;background:rgba(122,58,26,.25);position:relative;cursor:pointer;}
  .fill{position:absolute;left:0;top:0;height:100%;border-radius:7px;background:var(--roar);width:0%;}
  .knob{position:absolute;top:50%;width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--roar);transform:translate(-50%,-50%);left:0%;box-shadow:0 2px 5px rgba(0,0,0,.2);}
</style>
</head>
<body>
  <div class="stage" id="stage">
 
    <div class="roar-title">
      <span class="ray l"><span></span><span></span><span></span></span>
      ROAR
      <span class="ray r"><span></span><span></span><span></span></span>
    </div>
 
    <div class="lion-wrap">
      <svg class="lion" viewBox="0 0 400 420" xmlns="http://www.w3.org/2000/svg">
 
        <!-- ============ EARS (behind mane, clearly poking out on top) ============ -->
        <g>
          <circle cx="118" cy="118" r="34" fill="var(--ear)"/>
          <circle cx="282" cy="118" r="34" fill="var(--ear)"/>
          <circle cx="118" cy="120" r="19" fill="var(--ear-inner)"/>
          <circle cx="282" cy="120" r="19" fill="var(--ear-inner)"/>
        </g>
 
        <!-- ============ MANE ============ -->
        <!-- outer dark lobes -->
        <g fill="var(--mane-dark)">
          <circle cx="200" cy="92" r="56"/>
          <circle cx="128" cy="128" r="52"/>
          <circle cx="272" cy="128" r="52"/>
          <circle cx="80" cy="200" r="54"/>
          <circle cx="320" cy="200" r="54"/>
          <circle cx="92" cy="278" r="50"/>
          <circle cx="308" cy="278" r="50"/>
          <circle cx="150" cy="335" r="50"/>
          <circle cx="250" cy="335" r="50"/>
          <circle cx="200" cy="356" r="48"/>
        </g>
        <!-- mid tone lobes -->
        <g fill="var(--mane-mid)">
          <circle cx="200" cy="108" r="44"/>
          <circle cx="138" cy="150" r="42"/>
          <circle cx="262" cy="150" r="42"/>
          <circle cx="104" cy="208" r="42"/>
          <circle cx="296" cy="208" r="42"/>
          <circle cx="118" cy="278" r="40"/>
          <circle cx="282" cy="278" r="40"/>
          <circle cx="162" cy="322" r="40"/>
          <circle cx="238" cy="322" r="40"/>
        </g>
        <!-- inner light ring framing the face -->
        <g fill="var(--mane-light)">
          <circle cx="200" cy="130" r="34"/>
          <circle cx="148" cy="168" r="32"/>
          <circle cx="252" cy="168" r="32"/>
          <circle cx="126" cy="222" r="32"/>
          <circle cx="274" cy="222" r="32"/>
          <circle cx="150" cy="300" r="32"/>
          <circle cx="250" cy="300" r="32"/>
          <circle cx="200" cy="318" r="32"/>
        </g>
 
        <!-- ============ FACE ============ -->
        <circle cx="200" cy="222" r="116" fill="var(--face)"/>
        <!-- muzzle / cheeks -->
        <ellipse cx="200" cy="270" rx="96" ry="78" fill="var(--face-light)"/>
 
        <!-- eyes (closed, happy curved) -->
        <path d="M148 205 q16 -20 34 0" stroke="var(--ink)" stroke-width="8" fill="none" stroke-linecap="round"/>
        <path d="M218 205 q16 -20 34 0" stroke="var(--ink)" stroke-width="8" fill="none" stroke-linecap="round"/>
        <!-- brows -->
        <path d="M146 184 q18 -12 38 -3" stroke="var(--ink)" stroke-width="6" fill="none" stroke-linecap="round"/>
        <path d="M216 181 q20 -9 38 3" stroke="var(--ink)" stroke-width="6" fill="none" stroke-linecap="round"/>
 
        <!-- nose -->
        <path d="M184 232 q16 -8 32 0 q-4 12 -16 16 q-12 -4 -16 -16 z" fill="var(--ink)"/>
        <path d="M200 248 v9" stroke="var(--ink)" stroke-width="4" stroke-linecap="round"/>
 
        <!-- ============ MOUTH = PLAY BUTTON ============ -->
        <g class="mouth-btn" id="mouthBtn" role="button" aria-label="Abspielen">
          <!-- open roaring mouth -->
          <path d="M200 256
                   C166 256 146 266 146 286
                   C146 330 170 366 200 366
                   C230 366 254 330 254 286
                   C254 266 234 256 200 256 Z"
                fill="var(--mouth-outer)"/>
          <path d="M200 266
                   C174 266 158 274 158 288
                   C158 324 178 356 200 356
                   C222 356 242 324 242 288
                   C242 274 226 266 200 266 Z"
                fill="var(--mouth-inner-solid)"/>
          <!-- upper fangs -->
          <path d="M174 267 l8 15 l8 -15 z" fill="var(--white)"/>
          <path d="M210 267 l8 15 l8 -15 z" fill="var(--white)"/>
          <!-- tongue -->
          <ellipse cx="200" cy="332" rx="28" ry="24" fill="var(--tongue)"/>
          <path d="M200 318 v24" stroke="var(--tongue-dark)" stroke-width="3" stroke-linecap="round"/>
 
          <!-- play button inside the mouth -->
          <g class="mouth-hint" id="hintGroup">
            <circle cx="200" cy="306" r="27" fill="rgba(255,255,255,.94)"/>
            <path id="ppIcon" d="M192 293 l21 13 l-21 13 z" fill="var(--tongue)"/>
          </g>
        </g>
        <!-- ============================================== -->
 
        <!-- whiskers -->
        <g stroke="var(--ink)" stroke-width="3" stroke-linecap="round" opacity=".5">
          <path d="M150 250 q-32 -2 -54 4"/>
          <path d="M150 264 q-32 4 -52 16"/>
          <path d="M250 250 q32 -2 54 4"/>
          <path d="M250 264 q32 4 52 16"/>
        </g>
      </svg>
    </div>
 
    <div class="hint-text" id="hintText">Tippe ins Maul, um zu hören 🔊</div>
 
    <div class="timeline">
      <span class="time" id="cur">0:00</span>
      <div class="bar" id="bar"><div class="fill" id="fill"></div><div class="knob" id="knob"></div></div>
      <span class="time" id="dur">0:00</span>
    </div>
  </div>
 
  <audio id="audio" src="roar.mp3" preload="auto"></audio>
 
<script>
  const audio = document.getElementById('audio');
  const mouth = document.getElementById('mouthBtn');
  const ppIcon= document.getElementById('ppIcon');
  const hintGroup = document.getElementById('hintGroup');
  const stage = document.getElementById('stage');
  const fill  = document.getElementById('fill');
  const knob  = document.getElementById('knob');
  const bar   = document.getElementById('bar');
  const cur   = document.getElementById('cur');
  const dur   = document.getElementById('dur');
 
  const PLAY  = 'M192 293 l21 13 l-21 13 z';
  const PAUSE = 'M190 293 h7 v26 h-7 z M205 293 h7 v26 h-7 z';
 
  function setPlaying(p){
    stage.classList.toggle('playing', p);
    ppIcon.setAttribute('d', p ? PAUSE : PLAY);
    hintGroup.style.opacity = p ? '0' : '1';
  }
  function fmt(t){ if(isNaN(t)) return '0:00'; const m=Math.floor(t/60), s=Math.floor(t%60); return m+':'+String(s).padStart(2,'0'); }
 
  window.addEventListener('load', ()=>{ audio.play().then(()=>setPlaying(true)).catch(()=>{}); });
 
  mouth.addEventListener('click', ()=>{
    audio.muted = false;
    if(audio.paused){ audio.play(); setPlaying(true); }
    else { audio.pause(); setPlaying(false); }
  });
 
  audio.addEventListener('play', ()=>setPlaying(true));
  audio.addEventListener('pause',()=>setPlaying(false));
  audio.addEventListener('ended',()=>setPlaying(false));
  audio.addEventListener('loadedmetadata', ()=> dur.textContent = fmt(audio.duration));
  audio.addEventListener('timeupdate', ()=>{
    const pct=(audio.currentTime/audio.duration)*100||0;
    fill.style.width=pct+'%'; knob.style.left=pct+'%';
    cur.textContent=fmt(audio.currentTime);
  });
  bar.addEventListener('click', e=>{
    const r=bar.getBoundingClientRect();
    audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
  });
</script>
</body>
</html>
