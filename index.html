<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ROAR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#e9c188;
    --bg-bottom:#d9b074;
    --card:#ffffff;
    --player-bg:#c9b393;
    --ink:#4a3826;
    --ink-soft:#7a6248;
    --accent:#b5642a;
    --track:#a08e6f;
    --track-fill:#5d4a32;
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

  html,body{height:100%;}

  body{
    font-family:'Nunito',sans-serif;
    background:linear-gradient(180deg,var(--bg-top) 0%, var(--bg-bottom) 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    overflow:hidden;
    position:relative;
  }

  /* subtle texture */
  body::before{
    content:"";
    position:fixed;inset:0;
    background-image:radial-gradient(circle at 50% 0%, rgba(255,255,255,.25), transparent 60%);
    pointer-events:none;
  }

  .stage{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:26px;
    animation:rise .7s cubic-bezier(.2,.8,.2,1) both;
  }

  @keyframes rise{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:none;}}

  /* share button row */
  .topbar{width:100%;display:flex;justify-content:flex-end;}
  .share{
    width:46px;height:46px;border-radius:14px;
    background:var(--card);
    border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 18px rgba(74,56,38,.18);
    transition:transform .15s ease;
  }
  .share:active{transform:scale(.92);}
  .share svg{width:22px;height:22px;stroke:var(--ink);}

  /* artwork card */
  .art{
    width:100%;
    background:var(--card);
    border-radius:28px;
    padding:38px 28px 30px;
    text-align:center;
    box-shadow:0 24px 60px rgba(74,56,38,.22);
    position:relative;
    overflow:hidden;
  }

  .art-logo{
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:42px;
    letter-spacing:2px;
    color:var(--accent);
    display:flex;align-items:center;justify-content:center;gap:14px;
    margin-bottom:8px;
  }
  .art-logo .bars{color:var(--accent);font-weight:700;font-size:36px;line-height:1;}

  .lion{
    font-size:140px;
    line-height:1;
    margin:6px 0 0;
    filter:drop-shadow(0 8px 14px rgba(74,56,38,.18));
    transition:transform .25s ease;
  }
  .playing .lion{animation:bob 1.6s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-8px) rotate(2deg);}}

  /* player panel */
  .player{
    width:100%;
    background:var(--player-bg);
    border-radius:24px;
    padding:22px 22px 24px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.25), 0 16px 40px rgba(74,56,38,.20);
  }

  .title{
    font-family:'Fredoka',sans-serif;
    font-weight:600;
    font-size:24px;
    color:var(--ink);
    text-align:center;
    margin-bottom:18px;
    letter-spacing:.5px;
  }

  .timeline{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .time{font-size:13px;font-weight:700;color:var(--ink);min-width:38px;text-align:center;font-variant-numeric:tabular-nums;}
  .bar{
    flex:1;height:6px;border-radius:6px;
    background:var(--track);
    position:relative;cursor:pointer;
  }
  .fill{
    position:absolute;left:0;top:0;height:100%;border-radius:6px;
    background:var(--track-fill);width:0%;
  }
  .knob{
    position:absolute;top:50%;width:16px;height:16px;border-radius:50%;
    background:#fff;border:3px solid var(--track-fill);
    transform:translate(-50%,-50%);left:0%;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
  }

  .controls{display:flex;align-items:center;justify-content:space-between;}
  .ctrl{
    background:none;border:none;cursor:pointer;
    color:var(--ink);display:flex;align-items:center;justify-content:center;
    transition:transform .15s ease,opacity .15s ease;
  }
  .ctrl:active{transform:scale(.85);}
  .ctrl svg{width:26px;height:26px;fill:var(--ink);}

  .play{
    width:64px;height:64px;border-radius:50%;
    background:var(--card);
    box-shadow:0 8px 22px rgba(74,56,38,.28);
  }
  .play svg{width:26px;height:26px;fill:var(--ink);margin-left:2px;}
  .play.is-playing svg{margin-left:0;}

  .loop.active{opacity:1;color:var(--accent);}
  .loop{opacity:.5;}

  /* tap-to-start overlay (browsers block autoplay with sound) */
  .gate{
    position:fixed;inset:0;
    background:rgba(74,56,38,.55);
    backdrop-filter:blur(6px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:18px;z-index:50;cursor:pointer;
    animation:fade .4s ease both;
  }
  @keyframes fade{from{opacity:0;}to{opacity:1;}}
  .gate.hide{opacity:0;pointer-events:none;transition:opacity .4s ease;}
  .gate .pulse{
    width:96px;height:96px;border-radius:50%;
    background:var(--card);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 12px 40px rgba(0,0,0,.3);
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
  .gate .pulse svg{width:38px;height:38px;fill:var(--accent);margin-left:4px;}
  .gate p{color:#fff;font-weight:800;font-size:18px;letter-spacing:.5px;text-shadow:0 2px 8px rgba(0,0,0,.3);}
</style>
</head>
<body>

  <div class="stage" id="stage">
    <div class="topbar">
      <button class="share" id="shareBtn" aria-label="Partager">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle>
          <line x1="8.6" y1="10.6" x2="15.4" y2="6.4"></line><line x1="8.6" y1="13.4" x2="15.4" y2="17.6"></line>
        </svg>
      </button>
    </div>

    <div class="art" id="art">
      <div class="art-logo"><span class="bars">≋</span>ROAR<span class="bars">≋</span></div>
      <div class="lion">🦁</div>
    </div>

    <div class="player">
      <div class="title">ROAR</div>

      <div class="timeline">
        <span class="time" id="cur">0:00</span>
        <div class="bar" id="bar">
          <div class="fill" id="fill"></div>
          <div class="knob" id="knob"></div>
        </div>
        <span class="time" id="dur">0:00</span>
      </div>

      <div class="controls">
        <button class="ctrl loop" id="loopBtn" aria-label="Répéter">
          <svg viewBox="0 0 24 24"><path d="M17 1l4 4-4 4V6H7a4 4 0 00-4 4 1 1 0 11-2 0 6 6 0 016-6h10V1zM7 23l-4-4 4-4v3h10a4 4 0 004-4 1 1 0 112 0 6 6 0 01-6 6H7v3z"/></svg>
        </button>
        <button class="ctrl" id="prevBtn" aria-label="Reculer">
          <svg viewBox="0 0 24 24"><path d="M11 7l-7 5 7 5V7zm9 0l-7 5 7 5V7z"/></svg>
        </button>
        <button class="ctrl play" id="playBtn" aria-label="Lecture">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl" id="nextBtn" aria-label="Avancer">
          <svg viewBox="0 0 24 24"><path d="M13 7l7 5-7 5V7zM4 7l7 5-7 5V7z"/></svg>
        </button>
        <button class="ctrl" id="muteBtn" aria-label="Son">
          <svg id="volIcon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mets ton fichier MP3 à côté de ce fichier et garde le nom roar.mp3 -->
  <audio id="audio" src="roar.mp3" preload="auto"></audio>

  <!-- Overlay obligatoire : les navigateurs bloquent l'autoplay avec son -->
  <div class="gate" id="gate">
    <div class="pulse"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    <p>Touchez pour écouter</p>
  </div>

<script>
  const audio   = document.getElementById('audio');
  const gate    = document.getElementById('gate');
  const playBtn = document.getElementById('playBtn');
  const playIcon= document.getElementById('playIcon');
  const fill    = document.getElementById('fill');
  const knob    = document.getElementById('knob');
  const bar     = document.getElementById('bar');
  const cur     = document.getElementById('cur');
  const dur     = document.getElementById('dur');
  const loopBtn = document.getElementById('loopBtn');
  const muteBtn = document.getElementById('muteBtn');
  const volIcon = document.getElementById('volIcon');
  const stage   = document.getElementById('stage');

  const PLAY = '<path d="M8 5v14l11-7z"/>';
  const PAUSE= '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';

  function fmt(t){ if(isNaN(t)) return '0:00'; const m=Math.floor(t/60), s=Math.floor(t%60); return m+':'+String(s).padStart(2,'0'); }

  function showPlaying(p){
    playIcon.innerHTML = p ? PAUSE : PLAY;
    playBtn.classList.toggle('is-playing', p);
    stage.classList.toggle('playing', p);
  }

  // Essaie de lancer la lecture immédiatement (muet d'abord si nécessaire)
  function tryAutoplay(){
    audio.play().then(()=>{ gate.classList.add('hide'); showPlaying(true); })
                .catch(()=>{ /* bloqué : on attend le tap */ });
  }
  window.addEventListener('load', tryAutoplay);

  // Tap sur l'overlay -> démarre avec le son
  gate.addEventListener('click', ()=>{
    audio.muted = false;
    audio.play().then(()=>{ gate.classList.add('hide'); showPlaying(true); });
  });

  playBtn.addEventListener('click', ()=>{
    if(audio.paused){ audio.play(); showPlaying(true); }
    else { audio.pause(); showPlaying(false); }
  });

  audio.addEventListener('play',  ()=>showPlaying(true));
  audio.addEventListener('pause', ()=>showPlaying(false));
  audio.addEventListener('loadedmetadata', ()=> dur.textContent = fmt(audio.duration));
  audio.addEventListener('timeupdate', ()=>{
    const pct = (audio.currentTime/audio.duration)*100 || 0;
    fill.style.width = pct+'%';
    knob.style.left  = pct+'%';
    cur.textContent  = fmt(audio.currentTime);
  });

  bar.addEventListener('click', e=>{
    const r = bar.getBoundingClientRect();
    audio.currentTime = ((e.clientX - r.left)/r.width) * audio.duration;
  });

  document.getElementById('prevBtn').addEventListener('click', ()=> audio.currentTime = Math.max(0, audio.currentTime-10));
  document.getElementById('nextBtn').addEventListener('click', ()=> audio.currentTime = Math.min(audio.duration, audio.currentTime+10));

  loopBtn.addEventListener('click', ()=>{
    audio.loop = !audio.loop;
    loopBtn.classList.toggle('active', audio.loop);
  });

  muteBtn.addEventListener('click', ()=>{
    audio.muted = !audio.muted;
    volIcon.innerHTML = audio.muted
      ? '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4v.8l2.4 2.4c.06-.39.1-.79.1-1.2zM19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.8 8.8 0 0021 12a9 9 0 00-6-8.49v2.06A7 7 0 0119 12zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06a9 9 0 003.69-1.81L19.73 21 21 19.73 4.27 3z"/>'
      : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z"/>';
  });

  document.getElementById('shareBtn').addEventListener('click', async ()=>{
    if(navigator.share){ try{ await navigator.share({title:'ROAR', url:location.href}); }catch(e){} }
    else { navigator.clipboard?.writeText(location.href); }
  });
</script>
</body>
</html>
